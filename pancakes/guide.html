<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pancakes Guides</title>
    <link rel="icon" type="image/x-icon" href="../../assets/pancake.png">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f4f4f9; color: #333; line-height: 1.6; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); max-width: 800px; width: 100%; margin-top: 40px; min-height: 50vh; }
        
        /* Markdown Styling */
        h1, h2, h3 { color: #111; border-bottom: 1px solid #eee; padding-bottom: 5px; }
        pre { background: #2d2d2d; color: #f8f8f2; padding: 15px; border-radius: 8px; overflow-x: auto; }
        code { background: #eee; padding: 2px 5px; border-radius: 4px; font-family: monospace; }
        pre code { background: transparent; padding: 0; }
        img { max-width: 100%; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); margin: 15px 0; }
        a { color: #ff6b6b; text-decoration: none; }
        a:hover { text-decoration: underline; }
        
        /* Guide Hub Styling */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; margin-top: 20px; }
        .guide-card { display: block; border: 1px solid #eaeaea; padding: 20px; border-radius: 10px; transition: transform 0.2s, box-shadow 0.2s; color: inherit; text-decoration: none; cursor: pointer; }
        .guide-card:hover { transform: translateY(-3px); box-shadow: 0 6px 15px rgba(0,0,0,0.08); text-decoration: none; }
        .guide-card h3 { border: none; margin: 0 0 10px 0; color: #ff6b6b; font-size: 1.2rem; }
        .tag { background: #eee; font-size: 0.8rem; padding: 3px 8px; border-radius: 12px; margin-right: 5px; color: #555; display: inline-block; }
        .pin { float: right; font-size: 1.2rem; }
        .back-btn { display: inline-block; margin-bottom: 20px; font-weight: bold; cursor: pointer; }
        
        .loading, .error { text-align: center; font-size: 1.2rem; color: #666; margin-top: 50px; }
        .error { color: #fa5252; }
    </style>
</head>
<body>

    <div class="container" id="content">
        <div class="loading">Loading guides... 🥞</div>
    </div>

    <script>
        const rawBaseUrl = "https://raw.githubusercontent.com/moltenlavaguava/pancakes/main";
        const contentDiv = document.getElementById('content');
        
        // Store manifest globally so we don't fetch it multiple times
        let globalManifest = [];

        // Configure Marked.js for Images
        const renderer = new marked.Renderer();
        renderer.image = function(href, title, text) {
            if (!href.startsWith('http')) {
                const fileName = href.includes('.') ? href : `${href}.png`;
                href = `${rawBaseUrl}/images/${encodeURIComponent(fileName)}`;
            }
            return `<img src="${href}" alt="${text}" title="${title || ''}">`;
        };
        marked.use({ renderer });

        // INITIALIZATION
        async function init() {
            try {
                const response = await fetch(`${rawBaseUrl}/guides/manifest.json`);
                if (response.ok) globalManifest = await response.json();
            } catch (error) {
                console.error("Failed to load manifest.json", error);
            }
            route();
        }

        // ROUTER: Decides what to show based on the URL
        function route() {
            const pathParts = window.location.pathname.split('/guides/');
            let slug = pathParts.length > 1 ? decodeURIComponent(pathParts[1].replace(/\/$/, '')) : "";

            if (!slug || slug === "") {
                renderHub();
            } else {
                renderArticle(slug);
            }
        }

        // SPA NAVIGATION: Changes URL without reloading the page
        function navigate(event, path, slug = "") {
            event.preventDefault(); // Stops the page flicker!
            window.history.pushState({}, '', path);
            
            if (slug === "") renderHub();
            else renderArticle(slug);
        }

        // Listen for browser Back/Forward buttons
        window.addEventListener('popstate', () => {
            route();
        });

        // RENDER THE MENU
        function renderHub() {
            document.title = "Pancakes Guides";
            
            if (globalManifest.length === 0) {
                contentDiv.innerHTML = `<div class="error">Could not load manifest.json</div>`;
                return;
            }

            globalManifest.sort((a, b) => b.pinned - a.pinned);

            let html = `<h1>Pancakes Guides 🥞</h1><p>Select a guide below to get started:</p><div class="grid">`;
            
            globalManifest.forEach(item => {
                const tagsHtml = item.tags.map(tag => `<span class="tag">${tag}</span>`).join('');
                const pinHtml = item.pinned ? `<span class="pin">📌</span>` : '';
                const safeSlug = encodeURIComponent(item.slug);
                const path = `/pancakes/guides/${safeSlug}`;

                // Notice the onclick handler here
                html += `
                    <a href="${path}" class="guide-card" onclick="navigate(event, '${path}', '${item.slug}')">
                        ${pinHtml}
                        <h3>${item.name}</h3>
                        <div>${tagsHtml}</div>
                    </a>
                `;
            });

            html += `</div>`;
            contentDiv.innerHTML = html;
        }

        // RENDER A GUIDE
        async function renderArticle(slug) {
            contentDiv.innerHTML = `<div class="loading">Loading ${slug}... 🥞</div>`;
            
            const guideInfo = globalManifest.find(g => g.slug === slug);
            document.title = guideInfo ? `${guideInfo.name} - Pancakes` : `${slug} - Pancakes`;

            try {
                const response = await fetch(`${rawBaseUrl}/guides/${encodeURIComponent(slug)}.md`);
                if (!response.ok) throw new Error("Guide not found");

                const markdownText = await response.text();
                const html = marked.parse(markdownText);
                
                // Back button with onclick handler
                contentDiv.innerHTML = `
                    <a href="/pancakes/guides" class="back-btn" onclick="navigate(event, '/pancakes/guides')">← Back to Guides</a>
                    ${html}
                `;
                
                // Scroll to top of the container
                window.scrollTo(0, 0);

            } catch (error) {
                contentDiv.innerHTML = `
                    <div class="error">
                        <h2>Oops! 🥞</h2>
                        <p>We couldn't find the guide: <b>${slug}</b></p>
                        <a href="/pancakes/guides" class="back-btn" onclick="navigate(event, '/pancakes/guides')">← Back to Guides</a>
                    </div>
                `;
            }
        }

        // Start the app!
        init();
    </script>
</body>
</html>

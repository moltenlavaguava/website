<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>pancakes :D</title>
    <link rel="icon" type="image/x-icon" href="../assets/pancake.png">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #f4f4f9;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
            overflow: hidden;
        }

        #bg-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 0;
            pointer-events: none;
        }

        .floating-pancake {
            position: absolute;
            opacity: 0.3;
            animation: colorCycle 10s infinite linear;
        }

        @keyframes colorCycle {
            0% { filter: hue-rotate(0deg) saturate(1.5); }
            50% { filter: hue-rotate(180deg) saturate(2); }
            100% { filter: hue-rotate(360deg) saturate(1.5); }
        }

        .card {
            background: white;
            padding: 3rem;
            border-radius: 24px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.08);
            max-width: 480px; /* Slightly wider to fit horizontal buttons */
            width: 90%;
            z-index: 1;
            position: relative;
        }

        h1 {
            margin-top: 0;
            color: #333;
            font-size: 2.2rem;
        }

        p {
            color: #666;
            line-height: 1.5;
            margin-bottom: 30px;
        }

        /* --- BUTTON LAYOUT --- */
        .button-group {
            display: flex;
            flex-direction: row; /* Side by side */
            gap: 12px;
            width: 100%;
            margin-top: 20px;
        }

        .download-btn {
            flex: 2.5; /* Takes up much more space (~70%) */
            background: #ff6b6b;
            color: white;
            border: 2px solid #ff6b6b;
        }

        .secondary-btn {
            flex: 1; /* Takes up less space (~30%) */
            background: transparent;
            color: #ff6b6b;
            border: 2px solid #ff6b6b;
            white-space: nowrap; /* Prevents "Guides" from breaking into two lines */
        }

        .download-btn, .secondary-btn {
            padding: 16px 10px;
            font-size: 17px;
            font-weight: 700;
            text-decoration: none;
            border-radius: 14px;
            transition: all 0.2s ease;
            box-sizing: border-box;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .download-btn:hover {
            background: #fa5252;
            border-color: #fa5252;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(250, 82, 82, 0.25);
        }

        .secondary-btn:hover {
            background: rgba(255, 107, 107, 0.05);
            transform: translateY(-2px);
        }

        .os-hint {
            font-size: 13px;
            color: #aaa;
            margin-top: 25px;
            font-weight: 500;
        }

        /* Responsive: Stack buttons on small screens */
        @media (max-width: 400px) {
            .button-group {
                flex-direction: column;
            }
            .download-btn, .secondary-btn {
                width: 100%;
                flex: none;
            }
        }
    </style>
</head>

<body>

    <div id="bg-container"></div>

    <div class="card">
        <h1>Pancakes <img src="../assets/pancake.png" alt="Icon" style="width:32px;height:32px;vertical-align:middle;margin-bottom:4px;"></h1>
        <p>A fast & easy to use Python installer</p>

        <div class="button-group">
            <a id="download-link" href="#" class="download-btn">Detecting OS...</a>
            <a href="/pancakes/guides" class="secondary-btn">Guides</a>
        </div>

        <div id="os-text" class="os-hint"></div>
    </div>

    <script>
        // --- BACKGROUND PANCAKES ---
        function spawnPancakes() {
            const container = document.getElementById('bg-container');
            const numPancakes = 30;
            for (let i = 0; i < numPancakes; i++) {
                const img = document.createElement('img');
                img.src = '../assets/pancake.png';
                img.className = 'floating-pancake';
                const size = Math.random() * 80 + 40;
                img.style.width = `${size}px`;
                img.style.left = `${Math.random() * 100}vw`;
                img.style.top = `${Math.random() * 100}vh`;
                const colorSpeed = Math.random() * 10 + 5;
                img.style.animationDuration = `${colorSpeed}s`;
                img.style.animationDelay = `-${Math.random() * 10}s`;
                const driftTime = Math.random() * 15000 + 15000;
                img.animate([
                    { transform: `translate(0, 0) rotate(0deg)` },
                    { transform: `translate(${(Math.random()-0.5)*500}px, ${(Math.random()-0.5)*500}px) rotate(${(Math.random()-0.5)*360}deg)` }
                ], { duration: driftTime, iterations: Infinity, direction: 'alternate', easing: 'ease-in-out', delay: -(Math.random()*driftTime) });
                container.appendChild(img);
            }
        }
        spawnPancakes();

        // --- OS DETECTION ---
        const repo = "moltenlavaguava/pancakes";
        const baseUrl = `https://github.com/${repo}/releases/latest/download/`;
        const downloads = {
            windows: baseUrl + "pancakes.exe",
            linux: baseUrl + "pancakes-linux",
            macos: baseUrl + "pancakes-macOS-Universal.zip",
            fallback: `https://github.com/${repo}/releases/latest`
        };

        const btn = document.getElementById('download-link');
        const hint = document.getElementById('os-text');
        const urlParams = new URLSearchParams(window.location.search);
        const manualOS = urlParams.get('os');
        const platform = manualOS ? manualOS.toLowerCase() : window.navigator.platform.toLowerCase();

        if (platform.includes('win')) {
            btn.href = downloads.windows;
            btn.innerText = "Download for Windows";
            hint.innerText = "Standard .exe for Windows x64/ARM64";
        } else if (platform.includes('mac')) {
            btn.href = downloads.macos;
            btn.innerText = "Download for macOS";
            hint.innerText = "Universal App (Intel & Apple Silicon)";
        } else if (platform.includes('linux')) {
            btn.href = downloads.linux;
            btn.innerText = "Download for Linux";
            hint.innerText = "64-bit Linux Binary";
        } else {
            btn.href = downloads.fallback;
            btn.innerText = "View on GitHub";
            hint.innerText = "Mobile not supported - check GitHub for files";
        }
    </script>
</body>

</html>

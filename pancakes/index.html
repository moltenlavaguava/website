<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pancakes - RipTyde</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f4f4f9; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; text-align: center; }
        .card { background: white; padding: 3rem; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); max-width: 400px; width: 90%; }
        h1 { margin-top: 0; color: #333; }
        p { color: #666; line-height: 1.5; }
        .download-btn { background: #ff6b6b; color: white; padding: 15px 30px; font-size: 18px; font-weight: bold; text-decoration: none; border-radius: 12px; display: inline-block; transition: transform 0.2s, background 0.2s; margin-top: 20px; }
        .download-btn:hover { background: #fa5252; transform: translateY(-2px); }
        .os-hint { font-size: 12px; color: #999; margin-top: 15px; }
    </style>
</head>
<body>

    <div class="card">
        <h1>Pancakes 🥞</h1>
        <p>A fast, modern GUI app built with Rust and Iced.</p>
        
        <a id="download-link" href="#" class="download-btn">Detecting OS...</a>
        
        <div id="os-text" class="os-hint"></div>
    </div>

    <script>
        const repo = "moltenlavaguava/pancakes";
        const baseUrl = `https://github.com/${repo}/releases/latest/download/`;
        
        const downloads = {
            windows: baseUrl + "pancakes.exe",
            linux: baseUrl + "pancakes-linux",
            macos: baseUrl + "pancakes-macOS-Universal.zip",
            fallback: `https://github.com/${repo}/releases/latest`
        };

        const btn = document.getElementById('download-link');
        const hint = document.getElementById('os-text');
        const platform = window.navigator.platform.toLowerCase();

        if (platform.includes('win')) {
            btn.href = downloads.windows;
            btn.innerText = "Download for Windows";
            hint.innerText = "Standard .exe for Windows x64/ARM64";
        } else if (platform.includes('mac')) {
            btn.href = downloads.macos;
            btn.innerText = "Download for macOS";
            hint.innerText = "Universal App (Intel & Apple Silicon)";
        } else if (platform.includes('linux')) {
            btn.href = downloads.linux;
            btn.innerText = "Download for Linux";
            hint.innerText = "64-bit Linux Binary";
        } else {
            btn.href = downloads.fallback;
            btn.innerText = "View on GitHub";
            hint.innerText = "Mobile not supported - select platform on GitHub";
        }
    </script>
</body>
</html>

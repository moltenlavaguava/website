<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>pancakes :D</title>
    <link rel="icon" type="image/x-icon" href="../assets/pancake.png">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #f4f4f9;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
            overflow: hidden;
            /* Prevents scrollbars when pancakes drift off-screen */
        }

        /* Container for the floating background */
        #bg-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 0;
            pointer-events: none;
            /* Ensures you can still click the button through the images */
        }

        /* The base class for the background images */
        .floating-pancake {
            position: absolute;
            opacity: 0.4;
            /* Transparency */
            /* The color shifting animation */
            animation: colorCycle 10s infinite linear;
        }

        /* Slowly rotates the RGB hue to change colors completely */
        @keyframes colorCycle {
            0% {
                filter: hue-rotate(0deg) saturate(1.5);
            }

            50% {
                filter: hue-rotate(180deg) saturate(2);
            }

            100% {
                filter: hue-rotate(360deg) saturate(1.5);
            }
        }

        .card {
            background: white;
            padding: 3rem;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            max-width: 400px;
            width: 90%;
            z-index: 1;
            /* Keeps the card on top of the background */
            position: relative;
        }

        h1 {
            margin-top: 0;
            color: #333;
        }

        p {
            color: #666;
            line-height: 1.5;
        }

        .download-btn {
            background: #ff6b6b;
            color: white;
            padding: 15px 30px;
            font-size: 18px;
            font-weight: bold;
            text-decoration: none;
            border-radius: 12px;
            display: inline-block;
            transition: transform 0.2s, background 0.2s;
            margin-top: 20px;
        }

        .download-btn:hover {
            background: #fa5252;
            transform: translateY(-2px);
        }

        .os-hint {
            font-size: 12px;
            color: #999;
            margin-top: 15px;
        }
        .secondary-btn {
            background: #6b8eff; /* A nice blue to contrast the red download button */
            color: white;
            padding: 15px 30px;
            font-size: 18px;
            font-weight: bold;
            text-decoration: none;
            border-radius: 12px;
            display: inline-block;
            transition: transform 0.2s, background 0.2s;
            margin-top: 10px; /* Spacing between buttons */
            margin-left: 5px;  /* Spacing if they are side-by-side */
        }

        .secondary-btn:hover {
            background: #5271fa;
            transform: translateY(-2px);
        }
    </style>
</head>

<body>

    <!-- Background Container -->
    <div id="bg-container"></div>

    <div class="card">
        <h1>Pancakes <img src="../assets/pancake.png" alt="Icon Description" style="width:24px;height:24px;"></h1>
        <p>A fast & easy to use Python installer</p>

        <a id="download-link" href="#" class="download-btn">Detecting OS...</a>

        <a href="/pancakes/guides" class="secondary-btn">View Guides</a>

        <div id="os-text" class="os-hint"></div>
    </div>

    <script>
        // --- FLOATING PANCAKE BACKGROUND LOGIC ---
        function spawnPancakes() {
            const container = document.getElementById('bg-container');
            const numPancakes = 30; // Number of copies on screen

            for (let i = 0; i < numPancakes; i++) {
                const img = document.createElement('img');
                img.src = '../assets/pancake.png';
                img.className = 'floating-pancake';

                // 1. Random Size (between 40px and 120px)
                const size = Math.random() * 80 + 40;
                img.style.width = `${size}px`;
                img.style.height = `${size}px`;

                // 2. Random Starting Position
                img.style.left = `${Math.random() * 100}vw`;
                img.style.top = `${Math.random() * 100}vh`;

                // 3. Randomize the color cycle speed slightly so they aren't all matching
                const colorSpeed = Math.random() * 10 + 5; // 5 to 15 seconds
                img.style.animationDuration = `${colorSpeed}s`;
                img.style.animationDelay = `-${Math.random() * 10}s`; // Desyncs the colors

                // 4. Random Movement and Rotation
                const xMove = (Math.random() - 0.5) * 600; // Drift amount X
                const yMove = (Math.random() - 0.5) * 600; // Drift amount Y
                const rotate = (Math.random() - 0.5) * 360; // Spin amount
                const driftTime = Math.random() * 15000 + 15000; // 15 to 30 seconds to move

                img.animate([
                    { transform: `translate(0px, 0px) rotate(0deg)` },
                    { transform: `translate(${xMove}px, ${yMove}px) rotate(${rotate}deg)` }
                ], {
                    duration: driftTime,
                    iterations: Infinity,
                    direction: 'alternate',
                    easing: 'ease-in-out',
                    delay: -(Math.random() * driftTime) // Start animation midway through
                });

                container.appendChild(img);
            }
        }

        // Start the background effect
        spawnPancakes();


        // --- OS DETECTION & DOWNLOAD LOGIC ---
        const repo = "moltenlavaguava/pancakes";
        const baseUrl = `https://github.com/${repo}/releases/latest/download/`;

        const downloads = {
            windows: baseUrl + "pancakes.exe",
            linux: baseUrl + "pancakes-linux",
            macos: baseUrl + "pancakes-macOS-Universal.zip",
            fallback: `https://github.com/${repo}/releases/latest`
        };

        const btn = document.getElementById('download-link');
        const hint = document.getElementById('os-text');

        // Added ?os=trick for easy testing (e.g. riptyde.net/pancakes?os=mac)
        const urlParams = new URLSearchParams(window.location.search);
        const manualOS = urlParams.get('os');
        const platform = manualOS ? manualOS.toLowerCase() : window.navigator.platform.toLowerCase();

        if (platform.includes('win')) {
            btn.href = downloads.windows;
            btn.innerText = "Download for Windows";
            hint.innerText = "Standard .exe for Windows x64/ARM64";
        } else if (platform.includes('mac')) {
            btn.href = downloads.macos;
            btn.innerText = "Download for macOS";
            hint.innerText = "Universal App (Intel & Apple Silicon)";
        } else if (platform.includes('linux')) {
            btn.href = downloads.linux;
            btn.innerText = "Download for Linux";
            hint.innerText = "64-bit Linux Binary";
        } else {
            btn.href = downloads.fallback;
            btn.innerText = "View on GitHub";
            hint.innerText = "Mobile not supported - select platform on GitHub";
        }
    </script>
</body>

</html>
